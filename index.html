<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048 - 恋爱版 - 娇娇</title>
  <style>
    /* 全局样式与防微信滚动穿透 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #fff0f5; /* 淡粉色背景 */
      font-family: 'Microsoft YaHei', sans-serif;
      touch-action: none; /* 阻止默认滑动 */
    }

    .container {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      padding: 15px;
      text-align: center;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    h1 { color: #ff69b4; margin: 10px 0; font-size: 2em; text-shadow: 1px 1px 2px #ffb6c1; }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      background: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(255, 105, 180, 0.2);
    }

    .score-box { text-align: center; }
    .score-label { color: #888; font-size: 0.8em; }
    .score-value { color: #ff1493; font-weight: bold; font-size: 1.4em; }

    .btn {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      font-size: 0.9em;
      cursor: pointer;
      box-shadow: 0 2px 3px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    .btn:active { background: #ff1493; }

    /* 游戏棋盘 */
    .game-board {
      background: #ffc0cb;
      border-radius: 8px;
      padding: 8px;
      width: 100%;
      aspect-ratio: 1 / 1; /* 保证正方形 */
      position: relative;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
    }

    .grid-row {
      display: flex;
      margin-bottom: 8px;
    }
    .grid-row:last-child { margin-bottom: 0; }

    .grid-cell {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 5px;
      flex: 1;
      margin-right: 8px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2em;
      color: #8b5a2b;
      transition: all 0.15s ease-in-out;
    }
    .grid-cell:last-child { margin-right: 0; }

    /* 方块颜色映射 */
    .tile-2 { background: #fff; color: #8b5a2b; font-size: 1.1em; }
    .tile-4 { background: #ffe4e1; color: #8b5a2b; font-size: 1.1em; }
    .tile-8 { background: #ffb6c1; color: #fff; }
    .tile-16 { background: #ff69b4; color: #fff; }
    .tile-32 { background: #ff1493; color: #fff; }
    .tile-64 { background: #c71585; color: #fff; }
    .tile-128 { background: #da70d6; color: #fff; font-size: 1em; }
    .tile-256 { background: #ba55d3; color: #fff; font-size: 1em; }
    .tile-512 { background: #9370db; color: #fff; font-size: 1em; }
    .tile-1024 { background: #ff4500; color: #fff; font-size: 0.9em; box-shadow: 0 0 15px #ff4500; }
    .tile-2048 { background: #ffd700; color: #fff; font-size: 0.9em; box-shadow: 0 0 20px #ffd700; animation: shine 1s infinite; }

    @keyframes shine {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* 通关与游戏结束弹窗 */
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 8px;
      animation: fadeIn 0.5s;
    }
    .overlay h2 { color: #ff1493; margin-bottom: 15px; }
    .overlay p { margin-bottom: 20px; padding: 0 20px; line-height: 1.5; color: #555; }
    .overlay img { width: 80%; max-width: 200px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">
  <h1>2048-恋爱版</h1>
  <div class="info-panel">
    <div class="score-box">
      <div class="score-label">心动值</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div style="display: flex; gap: 10px;">
      <button class="btn" onclick="undoMove()">后悔药</button>
      <button class="btn" onclick="initGame()">重来</button>
    </div>
  </div>

<script>
  // 恋爱词汇映射表
  const TILE_MAP = {
    2: "初见二妮", 4: "一起吃一起玩", 8: "拉小手", 16: "抱一抱",
    32: "亲小口", 64: "LOVING", 128: "见家长咯", 256: "订婚啦",
    512: "结婚啦"
  };

  let size = 4;
  let grid = [];
  let score = 0;
  let previousState = null; // 用于悔棋
  let isGameOver = false;
  let hasWon = false;

  // 初始化游戏
  function initGame() {
    alert('要是能重来，我要选李白~~~');
    grid = Array.from({length: size}, () => Array(size).fill(0));
    score = 0;
    isGameOver = false;
    hasWon = false;
    document.getElementById('win-overlay').classList.add('hidden');
    document.getElementById('lose-overlay').classList.add('hidden');
    addRandomTile();
    addRandomTile();
    previousState = null;
    renderBoard();
  }

  // 渲染棋盘
  function renderBoard() {
    const boardEl = document.getElementById('board');
    // 清除旧的格子（保留弹窗）
    const oldCells = boardEl.querySelectorAll('.grid-row');
    oldCells.forEach(c => c.remove());

    for (let r = 0; r < size; r++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'grid-row';
      for (let c = 0; c < size; c++) {
        const cellDiv = document.createElement('div');
        const val = grid[r][c];
        cellDiv.className = `grid-cell ${val > 0 ? 'tile-' + val : ''}`;
        cellDiv.textContent = val > 0 ? TILE_MAP[val] : '';
        rowDiv.appendChild(cellDiv);
      }
      boardEl.appendChild(rowDiv);
    }
    document.getElementById('score').textContent = score;
  }

  // 添加随机方块 (修改概率让她更容易玩)
  function addRandomTile() {
    let emptyCells = [];
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (grid[r][c] === 0) emptyCells.push({r, c});
      }
    }
    if (emptyCells.length === 0) return;

    const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    // 80%概率生成4，20%概率生成8，降低难度加速升级
    grid[r][c] = Math.random() < 0.7 ? 4 : 2;
  }

  // 滑动逻辑核心
  function slide(row) {
    let arr = row.filter(val => val); // 去掉0
    let newArr = [];
    let scoreGain = 0;

    for (let i = 0; i < arr.length; i++) {
      if (i < arr.length - 1 && arr[i] === arr[i + 1]) {
        let mergedVal = arr[i] * 2;
        newArr.push(mergedVal);
        scoreGain += mergedVal;
        i++; // 跳过下一个
      } else {
        newArr.push(arr[i]);
      }
    }

    while (newArr.length < size) newArr.push(0);
    return { newRow: newArr, scoreGain };
  }

  // 移动操作
  function move(direction) {
    if (isGameOver) return;

    let moved = false;
    let totalScoreGain = 0;
    let oldGrid = grid.map(row => [...row]); // 深拷贝当前状态

    if (direction === 'left') {
      for (let r = 0; r < size; r++) {
        let { newRow, scoreGain } = slide(grid[r]);
        if (grid[r].toString() !== newRow.toString()) moved = true;
        grid[r] = newRow;
        totalScoreGain += scoreGain;
      }
    } else if (direction === 'right') {
      for (let r = 0; r < size; r++) {
        let row = [...grid[r]].reverse();
        let { newRow, scoreGain } = slide(row);
        newRow.reverse();
        if (grid[r].toString() !== newRow.toString()) moved = true;
        grid[r] = newRow;
        totalScoreGain += scoreGain;
      }
    } else if (direction === 'up') {
      for (let c = 0; c < size; c++) {
        let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
        let { newRow, scoreGain } = slide(col);
        if (col.toString() !== newRow.toString()) moved = true;
        for (let r = 0; r < size; r++) grid[r][c] = newRow[r];
        totalScoreGain += scoreGain;
      }
    } else if (direction === 'down') {
      for (let c = 0; c < size; c++) {
        let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
        let { newRow, scoreGain } = slide(col);
        newRow.reverse();
        if ([grid[0][c], grid[1][c], grid[2][c], grid[3][c]].toString() !== newRow.toString()) moved = true;
        for (let r = 0; r < size; r++) grid[r][c] = newRow[r];
        totalScoreGain += scoreGain;
      }
    }

    if (moved) {
      previousState = oldGrid; // 保存上一步用于悔棋
      score += totalScoreGain;
      addRandomTile();
      renderBoard();
      checkGameState();
    }
  }

  // 检查游戏状态
  function checkGameState() {
    // 检查是否赢了
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (grid[r][c] === 512 && !hasWon) {
          hasWon = true;
          document.getElementById('win-overlay').classList.remove('hidden');
          return;
        }
      }
    }

    // 检查是否还能移动
    // 1. 是否有空格
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (grid[r][c] === 0) return;
      }
    }
    // 2. 是否有相邻相同的方块
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const val = grid[r][c];
        if (c < size - 1 && grid[r][c + 1] === val) return;
        if (r < size - 1 && grid[r + 1][c] === val) return;
      }
    }

    // 既没赢，也不能动了，输了
    isGameOver = true;
    document.getElementById('lose-overlay').classList.remove('hidden');
  }

  // 悔棋功能
  function undoMove() {
    alert('世上哪有后悔呀！！！打一顿');
    return
    if (previousState) {
      grid = previousState.map(row => [...row]);
      previousState = null; // 只能悔棋一次
      renderBoard();
    }
  }

  // 通关后继续玩
  function continueGame() {
    document.getElementById('win-overlay').classList.add('hidden');
  }

  // --- 事件监听 ---

  // 键盘控制 (PC端)
  document.addEventListener('keydown', (e) => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
      e.preventDefault();
      const dirMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      move(dirMap[e.key]);
    }
  });

  // 触摸控制 (手机端)
  let startX, startY;
  const boardEl = document.getElementById('board');

  boardEl.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  });

  boardEl.addEventListener('touchend', (e) => {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const diffX = endX - startX;
    const diffY = endY - startY;

    // 至少滑动30px才算有效
    if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) return;

    if (Math.abs(diffX) > Math.abs(diffY)) {
      move(diffX > 0 ? 'right' : 'left');
    } else {
      move(diffY > 0 ? 'down' : 'up');
    }
  });

  // 启动游戏
  initGame();
</script>
</body>
</html>
